<!-- ============================================================================== -->
<!-- BEWERTUNGSRELEVANT: KOMPETENZ C4 (HTML-Dateien validiert)                      -->
<!-- ============================================================================== -->
<!-- Das Upload-Formular ist nach W3C-Vorgaben aufgebaut.                           -->
<div class="login-wrapper">
    
    <div class="fl-window" style="width: 450px;"> 
        <div class="fl-window-header">
            WAV-Manager // Add New Sound
        </div>
        
        <div class="fl-window-body">
            {{ERROR}}
            {{SUCCESS}}

            <form action="upload.php" method="POST" enctype="multipart/form-data">
                
                <!-- ============================================================================== -->
                <!-- ============================================================================== -->
                <!-- Das 'required'-Attribut und 'accept=".wav"' zwingen den User bereits           -->
                <!-- clientseitig dazu, korrekte Eingaben zu tätigen.                               -->
                <div class="form-group">
                    <label for="wav_file">WAV File select *</label>
                    <input type="file" id="wav_file" name="wav_file" accept=".wav" class="fl-input" required>
                </div>

                <div class="form-group">
                    <label for="description">Description / Notes</label>
                    <textarea id="description" name="description" placeholder="e.g. Hard hitting distorted kick..." class="fl-input" rows="2" style="resize: vertical;"></textarea>
                </div>

                <div class="form-group">
                    <label for="type">Type *</label>
                    <select id="type" name="type" class="fl-input" onchange="toggleEngineFields()" required>
                        <option value="">-- Select Type --</option>
                        <option value="one_shot">One-Shot (Table: one_shots)</option>
                        <option value="sample">Sample / Stem (Table: samples)</option>
                        <option value="song">Track / Full Mix (Table: songs)</option>
                    </select>
                </div>

                <div id="dynamic-engine-panel" style="display: none; background: rgba(0, 0, 0, 0.15); padding: 12px; border-left: 2px solid #4facfe; margin: 15px 0; border-radius: 4px;">
                    
                    <div class="form-group" id="group-bpm" style="display: none;">
                        <!-- Weitere clientseitige Validierung: min="1" max="999" -->
                        <label for="bpm" id="label-bpm">BPM (Tempo) *</label>
                        <input type="number" id="bpm" name="bpm" placeholder="e.g. 130" class="fl-input" min="1" max="999">
                    </div>

                    <div class="form-group" id="group-key" style="display: none;">
                        <label for="music_key">Key (Tonart)</label>
                        <input type="text" id="music_key" name="music_key" placeholder="e.g. Am, C#m" class="fl-input">
                    </div>

                    <div class="form-group" id="group-source" style="display: none;">
                        <label for="source_description">Source Description</label>
                        <input type="text" id="source_description" name="source_description" placeholder="e.g. Vinyl Rip, Roland TR-808" class="fl-input">
                    </div>

                    <div class="form-group" id="group-tags" style="display: none;">
                        <label for="tags">Tags</label>
                        <input type="text" id="tags" name="tags" placeholder="e.g. phonk, trap, ambient" class="fl-input">
                    </div>

                </div>

                <div class="form-group" id="group-relation" style="display: none; background: rgba(79, 172, 254, 0.05); padding: 12px; border-left: 2px solid #4facfe; margin: 15px 0; border-radius: 4px;">
                    <label for="target_sound" style="color: #4facfe; font-weight: bold;">🔗 Parent Sound / Origin (Optional)</label>
                    <p style="font-size: 11px; color: #aaa; margin-bottom: 8px; margin-top: 2px;">Verknüpfe diesen Sound mit einem übergeordneten Track oder Stem:</p>
                    <select id="target_sound" name="target_sound" class="fl-input">
                        {{RELATION_OPTIONS}}
                    </select>
                </div>

                <button type="submit" class="fl-btn" style="margin-top: 10px;">Load into Engine</button>
            </form>
            
        </div>
    </div>
</div>
