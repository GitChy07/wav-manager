<!-- ============================================================================== -->
<!-- BEWERTUNGSRELEVANT: KOMPETENZ C4 (HTML-Dateien validiert)                      -->
<!-- ============================================================================== -->
<!-- Die Explorer-Ansicht (Hauptinterface) ist valide nach W3C-Vorgaben aufgebaut.  -->
<div class="studio-layout" id="studio-layout">
    
    <div class="fl-panel panel-explorer">
        <div class="fl-window-header">📂 SAMPLE BROWSER (DATABASE LIVE SEARCH)</div>
        
        <div class="filter-bar" style="background: rgba(0,0,0,0.2); padding: 12px; border-bottom: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 10px;">
            
            <div style="display: flex; gap: 8px;">
                <input type="text" id="search-input" class="fl-input" placeholder="🔍 Search (e.g. 'kick', '#lofi', '#dark')..." oninput="triggerSearch()" style="flex: 2; font-size: 13px;">
                
                <select id="filter-type" class="relation-select" onchange="handleTypeChange()" style="flex: 1; margin-top: 0; padding: 6px;">
                    <option value="">All Types</option>
                    <option value="one_shot">🥁 One-Shots</option>
                    <option value="sample">🎹 Stems/Samples</option>
                    <option value="song">🎵 Tracks/Mixes</option>
                </select>
            </div>

            <div id="advanced-attributes-row" style="display: none; flex-direction: column; gap: 10px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 10px;">
                <div style="display: flex; gap: 12px; align-items: center;">
                    
                    <select id="filter-key" class="relation-select" onchange="triggerSearch()" style="flex: 1; margin-top: 0; padding: 6px;">
                        <option value="">All Keys</option>
                        <optgroup label="Major (Dur)">
                            <option value="C">C</option><option value="G">G</option><option value="D">D</option><option value="A">A</option><option value="E">E</option><option value="B">B</option><option value="F#">F#</option><option value="F">F</option><option value="Bb">Bb</option><option value="Eb">Eb</option><option value="Ab">Ab</option><option value="Db">Db</option>
                        </optgroup>
                        <optgroup label="Minor (Moll)">
                            <option value="Am">Am</option><option value="Em">Em</option><option value="Bm">Bm</option><option value="F#m">F#m</option><option value="C#m">C#m</option><option value="G#m">G#m</option><option value="D#m">D#m</option><option value="Dm">Dm</option><option value="Gm">Gm</option><option value="Cm">Cm</option><option value="Fm">Fm</option><option value="Bbm">Bbm</option>
                        </optgroup>
                    </select>

                    <div style="display: flex; flex-direction: column; flex: 2; background: var(--bg-input); border: 1px solid var(--border-color); border-radius: 3px; padding: 6px 10px;">
                        <div style="display: flex; justify-content: space-between; font-size: 10px; color: var(--text-muted); font-weight: bold; letter-spacing: 0.5px;">
                            <span>BPM RANGE</span>
                            <span id="bpm-range-display" style="color: #4facfe;">0 - 400 BPM</span>
                        </div>
                        
                        <div class="dual-slider-container">
                            <div class="slider-track-bg"></div>
                            <input type="range" id="filter-bpm-min" min="0" max="400" value="0" oninput="controlMinSlider()">
                            <input type="range" id="filter-bpm-max" min="0" max="400" value="400" oninput="controlMaxSlider()">
                        </div>
                    </div>

                </div>
            </div>
        </div>

        <div class="fl-window-body">
            <div id="search-counter" style="font-size: 11px; color: var(--text-muted); margin-bottom: 10px; font-style: italic; padding-left: 5px;">
                Loading archive...
            </div>
            <ul class="sound-list" id="main-sound-list"></ul>
        </div>
    </div>

    <div class="fl-panel panel-inspector">
        <div class="fl-window-header" style="display: flex; justify-content: space-between; align-items: center;">
            <span>🎛️ ENGINE INSPECTOR</span>
            <span class="close-inspector-btn" onclick="closeInspector()" style="cursor: pointer;">[X]</span>
        </div>
        
        <div class="fl-window-body">
            <div id="inspector-content" style="width: 100%; text-align: center;">
                <div class="cover-placeholder">
                    <span style="font-size: 45px; opacity: 0.25;" id="cover-icon">🎵</span>
                    <div style="position: absolute; bottom: 5px; right: 8px; font-size: 8px; color: var(--text-muted); letter-spacing: 1px; font-weight: bold;">NO COVER</div>
                </div>

                <h3 id="info-title" style="margin: 0 0 5px 0; color: var(--text-light); font-size: 15px; word-break: break-all;">-</h3>
                <span id="info-type" class="tag-badge" style="background: #4facfe; color: #fff; font-weight: bold; padding: 3px 8px; border-radius: 3px; display: inline-block; margin-bottom: 15px;">-</span>
                
                <div style="margin: 15px 0;">
                    <audio id="info-player" crossorigin="anonymous" controls style="width: 100%; border-radius: 4px; background: #222; outline: none;"></audio>
                </div>

                <div id="info-attributes" style="text-align: left; background: rgba(0,0,0,0.2); padding: 12px; border-radius: 4px; border: 1px solid #2d2d2d; font-size: 13px; margin-bottom: 15px;"></div>

                <div id="info-relations" style="margin-bottom: 15px; border-top: 1px solid var(--border-color); padding-top: 15px; display: none;"></div>

                <div id="relation-section" style="display: none; text-align: left; background: rgba(79, 172, 254, 0.05); padding: 12px; border-radius: 4px; border: 1px solid rgba(79, 172, 254, 0.2); font-size: 13px; margin-bottom: 15px;">
                    <strong style="color: #4facfe;">🔗 Sound Relation</strong>
                    <p style="font-size: 11px; color: var(--text-muted); margin: 4px 0 8px 0;">Verknüpfe diesen One-Shot mit einem Track oder Stem:</p>
                    
                    <form id="relation-form" onsubmit="saveRelation(event)">
                        <input type="hidden" name="child_id" id="relation-child-id" value="">
                        <input type="hidden" name="child_type" id="relation-child-type" value="">
                        <select name="target_sound" id="relation-target-select" class="relation-select"></select>
                        <button type="submit" class="tag-badge" style="background: #4facfe; color:#000; border:none; padding: 4px 10px; margin-top:8px; cursor:pointer; font-weight:bold; border-radius:3px; transition: background 0.2s;">Link Relation</button>
                    </form>
                </div>

                <div style="border-top: 1px solid #2d2d2d; padding-top: 15px; margin-top: 15px;">
                    <form action="includes/delete.php" method="POST" onsubmit="return confirm('Möchtest du diesen Sound wirklich unwiderruflich aus der Engine löschen?');">
                        <input type="hidden" name="sound_id" id="delete-sound-id" value="">
                        <input type="hidden" name="type" id="delete-sound-type" value="">
                        <button type="submit" class="btn-danger">❌ Delete Sound from Disk & DB</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
