<audio id="info-player" crossorigin="anonymous" style="display:none;"></audio>

<script>
document.addEventListener("DOMContentLoaded", async () => {
    try {
        const res = await fetch('includes/ghost_sounds.php');
        const data = await res.json();
        if (data.success && data.sounds.length > 0) {
            const sounds = data.sounds;
            
            setInterval(() => {
                // Nur zu 30% triggern, damit es nicht ablenkt
                if (Math.random() > 0.3) return;
                
                const sound = sounds[Math.floor(Math.random() * sounds.length)];
                spawnGhost(sound);
            }, 3000);
        }
    } catch (e) {
        console.error("No ghosts found");
    }
    
    function spawnGhost(sound) {
        const ghost = document.createElement('div');
        ghost.className = 'ghost-sound';
        
        let icon = '🎵';
        if (sound.type === 'one_shot') icon = '🥁';
        else if (sound.type === 'sample') icon = '🎹';
        
        ghost.innerHTML = `<span>${icon}</span><span class="ghost-text">${sound.title}</span>`;
        
        const startY = Math.random() * (window.innerHeight - 150) + 75;
        const fromLeft = Math.random() > 0.5;
        
        ghost.style.top = startY + 'px';
        ghost.style.left = fromLeft ? '-150px' : (window.innerWidth + 50) + 'px';
        
        // Random drift ampltitude
        const driftY = (Math.random() - 0.5) * 200;
        
        document.body.appendChild(ghost);
        
        const duration = Math.random() * 20000 + 15000; // 15-35s
        const endX = fromLeft ? window.innerWidth + 150 : -150;
        
        const animation = ghost.animate([
            { transform: `translate(0px, 0px)` },
            { transform: `translate(${endX - (fromLeft ? -150 : window.innerWidth + 50)}px, ${driftY}px)` }
        ], {
            duration: duration,
            easing: 'linear',
            fill: 'forwards'
        });
        
        animation.onfinish = () => ghost.remove();
        
        ghost.addEventListener('mouseenter', () => {
            const player = document.getElementById('info-player');
            if (player) {
                player.src = '../' + sound.file_path;
                player.load();
                if (typeof initVisualizer === 'function') {
                    initVisualizer();
                }
                player.play().catch(() => {});
            }
        });
        
        ghost.addEventListener('mouseleave', () => {
            const player = document.getElementById('info-player');
            if (player) {
                player.pause();
            }
        });
    }
});
</script>
